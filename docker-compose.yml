services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
      - temp_audio:/app/temp_audio
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    volumes:
      - ./app:/app/app
      - temp_audio:/app/temp_audio
    depends_on:
      - redis
    command: celery -A app.tasks:celery_app worker --loglevel=info --concurrency=4

volumes:
  redis_data:
  temp_audio:
