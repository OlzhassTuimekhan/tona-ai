services:
  redis:
    image: redis:7-alpine
    ports:
      - "6370:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jois
      POSTGRES_PASSWORD: jois
      POSTGRES_DB: jois
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jois -d jois"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - temp_audio:/app/temp_audio
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - temp_audio:/app/temp_audio
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    command: celery -A app.tasks:celery_app worker --loglevel=info --concurrency=4

  web:
    build: ./web
    ports:
      - "5173:80"
    depends_on:
      - api

  # Микрофон в браузере: только HTTPS. Без этого сервиса открыт только http://…:5173 — запись не работает по IP.
  # 1) ./nginx-ssl/generate-cert.sh <LAN_IP>  2) docker compose up -d
  # В браузере открывать https://<IP>:8443/ (не :5173)
  https-proxy:
    image: nginx:1.27-alpine
    ports:
      - "8443:443"
    volumes:
      - ./nginx-ssl/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ssl/certs:/etc/nginx/certs:ro
    depends_on:
      - web

volumes:
  redis_data:
  postgres_data:
  temp_audio:
  uploads:
