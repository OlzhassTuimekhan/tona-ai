services:
  redis:
    image: redis:7-alpine
    ports:
      - "6370:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8080:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
      - temp_audio:/app/temp_audio
      - uploads:/app/uploads
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    volumes:
      - ./app:/app/app
      - temp_audio:/app/temp_audio
      - uploads:/app/uploads
    depends_on:
      - redis
    command: celery -A app.tasks:celery_app worker --loglevel=info --concurrency=4

  web:
    build: ./web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  redis_data:
  temp_audio:
  uploads:
